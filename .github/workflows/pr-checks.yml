name: PR checks

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    name: Tests and regression protection
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt -r mcp_server/requirements.txt pytest httpx

      - name: Run backend tests
        run: python -m pytest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Run client chat tests
        working-directory: client
        run: npm run test:chat

      - name: Run client Electron tests
        working-directory: client
        run: npm run test:electron

      - name: Build client
        working-directory: client
        run: npm run build

      - name: Run explicit regression suite
        run: python scripts/run_regression_checks.py
