name: Release builds

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # The latest*.yml files are the update feeds electron-updater polls;
          # in-app updates break if they are missing from the release.
          - label: Linux AppImage
            os: ubuntu-latest
            artifact-name: athena-linux-appimage
            artifact-path: |
              client/release/*.AppImage
              client/release/latest-linux.yml
          - label: Windows installer
            os: windows-latest
            artifact-name: athena-windows-installer
            artifact-path: |
              client/release/*.exe
              client/release/*.blockmap
              client/release/latest.yml
          - label: macOS DMG
            os: macos-latest
            artifact-name: athena-macos-dmg
            artifact-path: |
              client/release/*.dmg
              client/release/*.zip
              client/release/*.blockmap
              client/release/latest-mac.yml

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Run client chat tests
        working-directory: client
        run: npm run test:chat

      - name: Run client Electron tests
        working-directory: client
        run: npm run test:electron

      - name: Build desktop package
        working-directory: client
        run: npm run dist -- --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error

      - name: Attach artifacts to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact-path }}
