appId: app.athena.workspace
productName: ATHENA
icon: build/icon.png
# Where the in-app updater (electron-updater) checks for new releases. Builds
# also emit latest*.yml metadata that must be attached to each GitHub release.
publish:
  provider: github
  owner: luckeyfaraday
  repo: Athena
directories:
  output: release
files:
  - dist/**
  - dist-electron/**
  - build/icon-512.png
  - build/icon.png
  - package.json
extraResources:
  - from: ../backend
    to: backend
    filter:
      - "**/*"
      - "!**/__pycache__/**"
      - "!**/*.pyc"
  - from: ../mcp_server
    to: mcp_server
    filter:
      - "**/*"
      - "!**/__pycache__/**"
      - "!**/*.pyc"
  - from: ../cli
    to: cli
    filter:
      - "**/*"
      - "!**/__pycache__/**"
      - "!**/*.pyc"
  - from: ../scripts
    to: scripts
    filter:
      - "**/*"
  - from: ../agent-skills
    to: agent-skills
    filter:
      - "**/*"
asar: true
asarUnpack:
  - node_modules/node-pty/**
npmRebuild: false
win:
  icon: build/icon.ico
  signAndEditExecutable: false
  target:
    - nsis
mac:
  icon: build/icon.png
  # electron-updater reads update metadata from the zip; the dmg is for
  # first-time installs.
  target:
    - dmg
    - zip
linux:
  icon: build/icon.png
  target:
    - AppImage
