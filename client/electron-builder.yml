appId: com.contextworkspace.app
productName: Context Workspace
directories:
  output: release
files:
  - dist/**
  - dist-electron/**
  - package.json
asar: true
asarUnpack:
  - node_modules/node-pty/**
npmRebuild: false
win:
  signAndEditExecutable: false
  target:
    - nsis
mac:
  target:
    - dmg
linux:
  target:
    - AppImage
